; PlatformIO Configuration — Govi Netha Edge Device
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    adafruit/DHT sensor library @ ^1.4.4
    adafruit/Adafruit Unified Sensor @ ^1.1.9
    bblanchon/ArduinoJson @ ^7.0.0
    knolleary/PubSubClient @ ^2.8         ; MQTT (optional, for future use)

build_flags =
    -DCORE_DEBUG_LEVEL=0
